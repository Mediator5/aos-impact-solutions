<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Free Consultation Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind = { config: { important: true } };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { important: true };
  </script>
  <style>
    body { font-family: 'Lato', sans-serif; }
    #consultation-form-wrap *,
    #consultation-form-wrap *::before,
    #consultation-form-wrap *::after { box-sizing: border-box; }
    #consultation-form-wrap input[type="text"],
    #consultation-form-wrap input[type="email"],
    #consultation-form-wrap input[type="password"],
    #consultation-form-wrap input[type="tel"],
    #consultation-form-wrap select,
    #consultation-form-wrap textarea { -webkit-appearance: none; appearance: none; }
    .custom-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      user-select: none;
      margin: 0;
    }
    .custom-checkbox input[type="checkbox"] {
      position: absolute !important;
      opacity: 0 !important;
      width: 0 !important;
      height: 0 !important;
      margin: 0 !important;
      pointer-events: none;
    }
    .custom-checkbox .checkmark {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      min-width: 18px;
      margin-top: 2px;
      border: 2px solid #d1d5db;
      border-radius: 4px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .custom-checkbox input[type="checkbox"]:checked + .checkmark {
      background: #eab308;
      border-color: #eab308;
    }
    .custom-checkbox input[type="checkbox"]:checked + .checkmark::after {
      content: '';
      display: block;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }
    .custom-checkbox:hover .checkmark { border-color: #eab308; }
  </style>
</head>
<body>

<div id="consultation-form-wrap" class="min-h-screen bg-gray-100 py-10 px-4">
  <div class="max-w-lg mx-auto bg-white rounded-xl shadow-2xl overflow-hidden">

    <!-- Header -->
    <div class="bg-white px-8 py-8 text-center border-b border-gray-200">
      <h1 class="text-3xl font-bold text-yellow-500 tracking-wide leading-tight">FREE CONSULTATION<br/>FORM</h1>
    </div>

    <form class="px-8 py-8 space-y-5">

      <!-- Last Name / First Name -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Last Name <span class="text-yellow-500">*</span></label>
          <input type="text" name="last_name" placeholder="Last Name"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>
        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">First Name <span class="text-yellow-500">*</span></label>
          <input type="text" name="first_name" placeholder="First Name"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>
      </div>

      <!-- Phone / Email -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Phone <span class="text-yellow-500">*</span></label>
          <input type="tel" id="phone" name="phone" placeholder="Phone" maxlength="12"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>
        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Email <span class="text-yellow-500">*</span></label>
          <input type="email" name="email" placeholder="Email"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>
      </div>

      <!-- Experian Section -->
      <div class="rounded-lg border border-yellow-400 bg-yellow-50 p-5 space-y-4">

        <p class="text-yellow-600 font-bold text-sm leading-snug">
          CLICK HERE to create an account with Experian and provide the login details below
        </p>

        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Experian Username <span class="text-yellow-500">*</span></label>
          <input type="text" name="experian_username" placeholder="Username"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>

        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Experian Password <span class="text-yellow-500">*</span></label>
          <input type="password" name="experian_password" placeholder="Password"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>

        <p class="text-gray-500 text-xs leading-relaxed">
          * If you can't find the Security Answer &amp; 4 digit pin. Click on Your Account, then Sign In &amp; Security and you can create it in that section.
        </p>

        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Experian Security Answer <span class="text-yellow-500">*</span></label>
          <input type="text" name="experian_security_answer" placeholder="Security Answer"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>

        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Experian 4 Digit Pin <span class="text-yellow-500">*</span></label>
          <input type="text" id="exp-pin" name="experian_pin" placeholder="4 Digit Pin" maxlength="4"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>

      </div>

      <!-- Services Checkboxes -->
      <div class="space-y-3">
        <label class="block text-gray-800 text-sm font-semibold">Choose One of these services describe what you are looking for?</label>

        <label class="custom-checkbox">
          <input type="checkbox" name="service" value="full_credit_restoration"/><span class="checkmark"></span>
          <span class="text-gray-700 text-sm">Full Credit Restoration (Including Inquiries)</span>
        </label>
        <label class="custom-checkbox">
          <input type="checkbox" name="service" value="inquiry_only_removal"/><span class="checkmark"></span>
          <span class="text-gray-700 text-sm">Inquiry Only Removal</span>
        </label>
        <label class="custom-checkbox">
          <input type="checkbox" name="service" value="authorized_user_tradelines"/><span class="checkmark"></span>
          <span class="text-gray-700 text-sm">Authorized User Tradelines</span>
        </label>
        <label class="custom-checkbox">
          <input type="checkbox" name="service" value="business_funding"/><span class="checkmark"></span>
          <span class="text-gray-700 text-sm">Business Funding</span>
        </label>
        <label class="custom-checkbox">
          <input type="checkbox" name="service" value="all_of_the_above"/><span class="checkmark"></span>
          <span class="text-gray-700 text-sm">All of the Above</span>
        </label>
      </div>

      <!-- SMS Consent -->
      <div class="border-t border-gray-200 pt-4">
        <label class="custom-checkbox">
          <input type="checkbox" name="sms_consent" value="1"/><span class="checkmark"></span>
          <span class="text-gray-600 text-sm leading-snug">I consent to receive SMS messages</span>
        </label>
      </div>

      <!-- Submit -->
      <button type="submit"
        class="w-full bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 transition text-gray-900 font-bold text-base py-3.5 rounded-lg flex items-center justify-center gap-2 shadow-lg shadow-yellow-500/20">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        Submit
      </button>

    </form>
  </div>
</div>

<script>
  // Phone: 554-213-1234
  document.getElementById('phone').addEventListener('input', function (e) {
    let val = e.target.value.replace(/\D/g, '').substring(0, 10);
    if (val.length >= 7) val = val.slice(0,3) + '-' + val.slice(3,6) + '-' + val.slice(6);
    else if (val.length >= 4) val = val.slice(0,3) + '-' + val.slice(3);
    e.target.value = val;
  });

  // PIN: digits only
  document.getElementById('exp-pin').addEventListener('input', function (e) {
    e.target.value = e.target.value.replace(/\D/g, '').substring(0, 4);
  });
</script>

</body>
</html>
