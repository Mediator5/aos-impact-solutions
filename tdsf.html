<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tradeline Signup Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind = { config: { important: true } };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { important: true };
  </script>
  <style>
    body { font-family: 'Lato', sans-serif; }
    #tradeline-form-wrap *,
    #tradeline-form-wrap *::before,
    #tradeline-form-wrap *::after { box-sizing: border-box; }
    #tradeline-form-wrap input,
    #tradeline-form-wrap select,
    #tradeline-form-wrap textarea { -webkit-appearance: none; appearance: none; }
      .custom-checkbox { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; user-select: none; margin: 0; }
    .custom-checkbox input[type="checkbox"] { position: absolute !important; opacity: 0 !important; width: 0 !important; height: 0 !important; margin: 0 !important; pointer-events: none; }
    .custom-checkbox .checkmark { flex-shrink: 0; width: 18px; height: 18px; min-width: 18px; margin-top: 2px; border: 2px solid #d1d5db; border-radius: 4px; background: #fff; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, background 0.15s; }
    .custom-checkbox input[type="checkbox"]:checked + .checkmark { background: #eab308; border-color: #eab308; }
    .custom-checkbox input[type="checkbox"]:checked + .checkmark::after { content: ""; display: block; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px, -1px); }
    .custom-checkbox:hover .checkmark { border-color: #eab308; }
  </style>
</head>
<body>

<div id="tradeline-form-wrap" class="min-h-screen bg-gray-100 py-10 px-4">
  <div class="max-w-lg mx-auto bg-white rounded-xl shadow-2xl overflow-hidden">

    <!-- Header -->
    <div class="bg-white px-8 py-8 text-center border-b border-gray-200">
      <h1 class="text-3xl font-bold text-yellow-500 tracking-wide">Tradeline Signup Form</h1>
    </div>

    <form class="px-8 py-8 space-y-5">

      <!-- First Name / Last Name -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">First Name <span class="text-yellow-500">*</span></label>
          <input type="text" placeholder="First Name"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>
        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Last Name <span class="text-yellow-500">*</span></label>
          <input type="text" placeholder="Last Name"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>
      </div>

      <!-- Phone / Email -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Phone <span class="text-yellow-500">*</span></label>
          <input type="tel" id="phone" placeholder="Phone" maxlength="12"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>
        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Email <span class="text-yellow-500">*</span></label>
          <input type="email" placeholder="Email"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>
      </div>

      <!-- Date of Birth -->
      <div class="space-y-1">
        <label class="block text-gray-800 text-sm font-semibold">Date Of Birth <span class="text-yellow-500">*</span></label>
        <input type="text" id="dob" placeholder="MM/DD/YEAR" maxlength="10"
          class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
      </div>

      <!-- Address -->
      <div class="space-y-1">
        <label class="block text-gray-800 text-sm font-semibold">Address <span class="text-yellow-500">*</span></label>
        <input type="text" placeholder="Address"
          class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
      </div>

      <!-- City -->
      <div class="space-y-1">
        <label class="block text-gray-800 text-sm font-semibold">City <span class="text-yellow-500">*</span></label>
        <input type="text" placeholder="City"
          class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
      </div>

      <!-- State -->
      <div class="space-y-1">
        <label class="block text-gray-800 text-sm font-semibold">State <span class="text-yellow-500">*</span></label>
        <input type="text" placeholder="State"
          class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
      </div>

      <!-- Zip -->
      <div class="space-y-1">
        <label class="block text-gray-800 text-sm font-semibold">Zip <span class="text-yellow-500">*</span></label>
        <input type="text" placeholder="Zip" maxlength="10"
          class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
      </div>

      <!-- Experian Section -->
      <div class="rounded-lg border border-yellow-400 bg-yellow-50 p-5 space-y-4">

        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Experian Username <span class="text-yellow-500">*</span></label>
          <input type="text" placeholder="Experian Username"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>

        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Experian Password <span class="text-yellow-500">*</span></label>
          <input type="password" placeholder="Experian Password"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>

        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Experian Security Answer <span class="text-yellow-500">*</span></label>
          <input type="text" placeholder="Experian Security Answer"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>

        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Experian 4 Digit Pin <span class="text-yellow-500">*</span></label>
          <input type="text" id="exp-pin" placeholder="Experian 4 Digit Pin" maxlength="4"
            class="w-full bg-white border border-gray-300 rounded-md px-4 py-2.5 text-gray-800 text-sm placeholder-gray-400 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition"/>
        </div>

      </div>

      <!-- File Uploads -->
      <div class="space-y-4">

        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Upload Drivers License <span class="text-yellow-500">*</span></label>
          <label class="custom-checkbox">
            <span class="inline-flex items-center gap-2 bg-gray-200 hover:bg-gray-300 transition text-gray-800 text-sm font-semibold px-4 py-2 rounded-md">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
              Choose File
            </span>
            <span class="text-gray-500 text-sm" id="file1-label">No file chosen</span>
            <input type="file" class="hidden" onchange="document.getElementById('file1-label').textContent = this.files[0]?.name || 'No file chosen'"/>
          </label>
        </div>

        <div class="space-y-1">
          <label class="block text-gray-800 text-sm font-semibold">Upload SSC <span class="text-yellow-500">*</span></label>
          <label class="custom-checkbox">
            <span class="inline-flex items-center gap-2 bg-gray-200 hover:bg-gray-300 transition text-gray-800 text-sm font-semibold px-4 py-2 rounded-md">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
              Choose File
            </span>
            <span class="text-gray-500 text-sm" id="file2-label">No file chosen</span>
            <input type="file" class="hidden" onchange="document.getElementById('file2-label').textContent = this.files[0]?.name || 'No file chosen'"/>
          </label>
        </div>

      </div>

      <!-- Tradeline Agreement -->
      <div class="space-y-4 border-t border-gray-200 pt-5">
        <h3 class="text-gray-800 font-bold text-base">Tradeline Agreement</h3>

        <label class="custom-checkbox">
          <input type="checkbox"/><span class="checkmark"></span>
          <span class="text-gray-600 text-sm leading-snug">
            There will be no refunds. If tradelines don't post you have the option to be placed on another tradeline.
          </span>
        </label>

        <label class="custom-checkbox">
          <input type="checkbox"/><span class="checkmark"></span>
          <span class="text-gray-600 text-sm leading-snug">
            It's the clients responsibility to make sure all SECURITY FREEZES AND BLOCKS ARE REMOVE FROM YOUR ALL CREDIT BUREAUS. Tradeline post are affected by freezes and blocks.
          </span>
        </label>
      </div>

      <!-- Submit -->
      <button type="submit"
        class="w-full bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 transition text-gray-900 font-bold text-base py-3.5 rounded-lg flex items-center justify-center gap-2 shadow-lg shadow-yellow-500/20">
        Submit
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </button>

    </form>
  </div>
</div>

<script>
  // Phone: 554-213-1234
  document.getElementById('phone').addEventListener('input', function (e) {
    let val = e.target.value.replace(/\D/g, '').substring(0, 10);
    if (val.length >= 7) val = val.slice(0,3) + '-' + val.slice(3,6) + '-' + val.slice(6);
    else if (val.length >= 4) val = val.slice(0,3) + '-' + val.slice(3);
    e.target.value = val;
  });

  // DOB: MM/DD/YYYY
  document.getElementById('dob').addEventListener('input', function (e) {
    let val = e.target.value.replace(/\D/g, '').substring(0, 8);
    if (val.length >= 5) val = val.slice(0,2) + '/' + val.slice(2,4) + '/' + val.slice(4);
    else if (val.length >= 3) val = val.slice(0,2) + '/' + val.slice(2);
    e.target.value = val;
  });

  // PIN: numbers only
  document.getElementById('exp-pin').addEventListener('input', function (e) {
    e.target.value = e.target.value.replace(/\D/g, '').substring(0, 4);
  });
</script>

</body>
</html>
